openapi: 3.0.3
info:
  title: Plant Care API
  version: 1.0.0
  description: API for Plant Care Diary (users, auth, plants, and events).
servers:
  - url: http://localhost:5000
    description: Local dev (default backend port)
tags:
  - name: Health
  - name: Users
  - name: Plants
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: OK

  /api/users/login:
    post:
      tags: [Users]
      summary: Login (may require MFA)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful (or MFA pending)
          headers:
            Set-Cookie:
              description: Signed refresh token cookie (`refresh_token`) is set on success.
              schema:
                type: string
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LoginMfaPendingResponse"
                  - $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/users/mfa-verify:
    post:
      tags: [Users]
      summary: Verify MFA code and complete login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaVerifyRequest"
      responses:
        "200":
          description: MFA verified
          headers:
            Set-Cookie:
              description: Signed refresh token cookie (`refresh_token`) is set on success.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/users/register:
    post:
      tags: [Users]
      summary: Register a new user (sends verification email)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registration accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/users/verification:
    post:
      tags: [Users]
      summary: Verify user email (token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/users/password-reset-request:
    post:
      tags: [Users]
      summary: Request password reset email (always returns success message)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "200":
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/users/password-reset-token:
    post:
      tags: [Users]
      summary: Validate password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/users/password-reset-submit:
    post:
      tags: [Users]
      summary: Submit new password with reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetSubmitRequest"
      responses:
        "200":
          description: Password reset successful
          headers:
            Set-Cookie:
              description: Refresh cookie is cleared on success.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/users/refresh:
    post:
      tags:
        - Users
      summary: Refresh access token from signed cookie
      description: 'Returns `{ "accessToken": null }` if no valid refresh cookie is present.'
      security:
        - refreshCookie: []
      responses:
        "200":
          description: Refreshed (or not available)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/users/logout:
    post:
      tags: [Users]
      summary: Logout (clears refresh cookie)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              description: Refresh cookie is cleared.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/users/profile:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [Users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdateRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/plants:
    get:
      tags: [Plants]
      summary: List plants (with event history)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plants list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlantsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Plants]
      summary: Create a plant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlantRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/plants/{id}:
    put:
      tags: [Plants]
      summary: Update a plant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlantRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlantDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [Plants]
      summary: Delete a plant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/plants/{plantId}/events:
    post:
      tags: [Plants]
      summary: Create an event for a plant
      security:
        - bearerAuth: []
      parameters:
        - name: plantId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/plants/{plantId}/events/{eventId}:
    delete:
      tags: [Plants]
      summary: Delete an event
      security:
        - bearerAuth: []
      parameters:
        - name: plantId
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"

  schemas:
    ApiValidationError:
      type: object
      additionalProperties: false
      properties:
        formErrors:
          type: array
          items: { type: string }
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
    ApiErrorBody:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
        validation:
          $ref: "#/components/schemas/ApiValidationError"

    EmailRequest:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    EmailResponse:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email:
          type: string
          format: email
    MessageResponse:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        message:
          type: string

    TokenRequest:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          format: uuid
    TokenResponse:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          format: uuid

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
    LoginMfaPendingResponse:
      type: object
      additionalProperties: false
      required: [mfaPending, email]
      properties:
        mfaPending:
          type: boolean
          enum: [true]
        email:
          type: string
          format: email
    LoginSuccessResponse:
      type: object
      additionalProperties: false
      required: [accessToken, firstName]
      properties:
        accessToken:
          type: string
        firstName:
          type: string
    MfaVerifyRequest:
      type: object
      additionalProperties: false
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [firstName, lastName, email, password]
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          description: Must contain at least one letter and one number.

    RefreshResponse:
      type: object
      additionalProperties: false
      required: [accessToken]
      properties:
        accessToken:
          type: string
          nullable: true

    LogoutResponse:
      type: object
      additionalProperties: false
      required: [success]
      properties:
        success:
          type: boolean

    CustomEventDto:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 60

    PublicUser:
      type: object
      additionalProperties: false
      required: [uuid, firstName, lastName, email, mfaEnabled, customEvents]
      properties:
        uuid:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        mfaEnabled:
          type: boolean
        customEvents:
          type: array
          items:
            $ref: "#/components/schemas/CustomEventDto"

    UserProfileUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          description: Must contain at least one letter and one number.
        mfaEnabled:
          type: boolean
        customEvents:
          type: array
          items:
            $ref: "#/components/schemas/CustomEventDto"

    PasswordResetSubmitRequest:
      type: object
      additionalProperties: false
      required: [token, password]
      properties:
        token:
          type: string
          format: uuid
        password:
          type: string
          minLength: 6
          description: Must contain at least one letter and one number.

    CareRule:
      oneOf:
        - $ref: "#/components/schemas/RecurringCareRule"
        - $ref: "#/components/schemas/DateCareRule"
      discriminator:
        propertyName: kind
        mapping:
          recurring: "#/components/schemas/RecurringCareRule"
          date: "#/components/schemas/DateCareRule"
    RecurringCareRule:
      type: object
      additionalProperties: false
      required: [kind, id, type, days]
      properties:
        kind:
          type: string
          enum: [recurring]
        id:
          type: string
          format: uuid
        type:
          type: string
          minLength: 1
          maxLength: 60
        days:
          type: integer
          format: int32
          minimum: 1
        notes:
          type: string
          maxLength: 1000
    DateCareRule:
      type: object
      additionalProperties: false
      required: [kind, id, type, date]
      properties:
        kind:
          type: string
          enum: [date]
        id:
          type: string
          format: uuid
        type:
          type: string
          minLength: 1
          maxLength: 60
        date:
          type: string
          format: date-time
        notes:
          type: string
          maxLength: 1000

    EventDto:
      type: object
      additionalProperties: false
      required: [id, plantId, type, date, notes]
      properties:
        id:
          type: integer
          format: int32
        plantId:
          type: integer
          format: int32
        type:
          type: string
          minLength: 1
          maxLength: 60
        date:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true

    PlantDto:
      type: object
      additionalProperties: false
      required: [id, name, careRules, history]
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
          minLength: 1
          maxLength: 60
        careRules:
          type: array
          items:
            $ref: "#/components/schemas/CareRule"
        imageUrl:
          type: string
          maxLength: 2048
          nullable: true
        history:
          type: array
          items:
            $ref: "#/components/schemas/EventDto"

    ListPlantsResponse:
      type: object
      additionalProperties: false
      required: [plants]
      properties:
        plants:
          type: array
          items:
            $ref: "#/components/schemas/PlantDto"

    CreatePlantRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        careRules:
          type: array
          default: []
          items:
            $ref: "#/components/schemas/CareRule"
        imageUrl:
          type: string
          maxLength: 2048
          nullable: true

    UpdatePlantRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        careRules:
          type: array
          items:
            $ref: "#/components/schemas/CareRule"
        imageUrl:
          type: string
          maxLength: 2048
          nullable: true

    CreateEventRequest:
      type: object
      additionalProperties: false
      required: [type, date]
      properties:
        type:
          type: string
          minLength: 1
          maxLength: 60
        date:
          type: string
          format: date-time
        notes:
          type: string
          maxLength: 1000

    CreateEventResponse:
      type: object
      additionalProperties: false
      required: [event, plant]
      properties:
        event:
          $ref: "#/components/schemas/EventDto"
        plant:
          $ref: "#/components/schemas/PlantDto"
