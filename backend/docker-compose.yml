services:
  server:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: server
    ports:
      - '${PORT}:${PORT}'
    restart: unless-stopped
    env_file: .env
    environment:
      - SETUP
    command:
      - sh
      - -c
      - |
        set -e

        if [ -n "${SETUP:-}" ]; then
          bun run migrate
          bun run seed
        fi

        if [ "${NODE_ENV:-}" = "production" ]; then
          bun src/app.ts
        else
          bun dev
        fi

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: worker
    depends_on:
      redis:
        condition: service_started
      server:
        condition: service_started
    restart: unless-stopped
    env_file: .env
    command:
      - sh
      - -c
      - |
        set -e
        bun worker:email

volumes:
  sqlite_data:
